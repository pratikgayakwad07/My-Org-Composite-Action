name: "React Deploy Action"
description: "Build and deploy React app to S3"

inputs:
  aws-access-key:
    required: true
  aws-secret-key:
    required: true
  aws-region:
    required: true
  s3-bucket:
    required: true

runs:
  using: "composite"
  steps:
    - name: Install Node
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install Dependencies
      run: npm install
      shell: bash

    - name: Build App
      run: npm run build
      shell: bash

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ inputs.aws-access-key }}
        aws-secret-access-key: ${{ inputs.aws-secret-key }}
        aws-region: ${{ inputs.aws-region }}

    - name: Deploy to S3
      run: aws s3 sync build/ s3://${{ inputs.s3-bucket }} --delete
      shell: bash
